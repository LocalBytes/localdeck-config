packages:
  - packages/*
  - components/**
  - '!**/test/**'

catalog:
  '@nuxt/test-utils': ^4.0.3
  nuxt: ^4.4.8
  typescript: ^6.0.3
  vite: ^8.0.0
  vitest: ^4.1.9

overrides:
  # Nuxt ships Vite 7 internally; force Vite 8 across the workspace.
  vite: ^8.0.0
  vitest: ^4.1.9

allowBuilds:
  '@parcel/watcher': true
  esbuild: true
  esphome-config-ts: true
  unrs-resolver: true
